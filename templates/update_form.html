{% extends "base.html" %}
{% load static %}

{% block css %}
<style>
  #user_info_form {
    background-color: white; 
    border: none;
    border-radius: 20px;
    padding: 25px 40px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1); 
    max-width: 800px; 
    width: 95%;
  }
  
  .form-floating > label {
    font-size: 0.9rem;
  }

  .form-control, .form-select {
    border-radius: 10px;
    height: calc(3rem + 2px) !important; 
  }

  #navbar {
    filter: blur(3px);
  }

  .update-title {
    color: #333;
    font-weight: 700;
    margin-top: 5px;
    font-size: 1.5rem; 
  }

  .logo-small {
    height: 40px; 
    width: auto;
  }
  
  .compact-row {
    margin-bottom: 10px !important; 
  }
</style>
{% endblock %}

{% block body %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 90vh;">
  <form method="post" action="{% url 'handle_update' path=current_path  %}" class="text-center w-100" id="user_info_form">
    {% csrf_token %}
    
    <div class="mb-3">
      <img class="logo-small" src="{% static 'logo1.png' %}" alt="img" />
      <h3 class="update-title italic mb-0">Update Account Info</h3>
    </div>

    <div class="text-start">
      <div class="form-floating compact-row mb-3">
        <select class="form-select" name="gender" required>
          <option value="" disabled selected>Select Gender</option>
          <option value="Male" {% if userinfo.gender == 'Male' %}selected{% endif %}>Male</option>
          <option value="Female" {% if userinfo.gender == 'Female' %}selected{% endif %}>Female</option>
        </select>
        <label>Gender</label>
      </div>

      <div class="row g-2 compact-row mb-3">
        <div class="col-md-4">
          <div class="form-floating">
            <input type="number" class="form-control" id="age" name="age" value="{{userinfo.age}}" placeholder="Age" min="1" required>
            <label for="age">Age</label>
          </div>
        </div>
        <div class="col-md-4">
          <div class="form-floating">
            <input type="number" class="form-control" id="weight" name="weight" value="{{userinfo.weight}}" placeholder="Weight" min="1" step="any" required>
            <label for="weight">Weight (kg)</label>
          </div>
        </div>
        <div class="col-md-4">
          <div class="form-floating">
            <input type="number" class="form-control" id="height_m" name="height_m" value="{{userinfo.h1}}" placeholder="Meters" min="0.1" step="any" required>
            <label for="height_m">Height (m)</label>
          </div>
        </div>
      </div>

      <div class="row g-2 compact-row mb-3">
        <div class="col-md-4">
          <div class="form-floating">
            <input type="number" class="form-control" id="height_cm" name="height_cm" value="{{userinfo.h2}}" placeholder="CM" min="1" step="any" required>
            <label for="height_cm">Height (cm)</label>
          </div>
        </div>
        <div class="col-md-4">
          <div class="form-floating">
            <select class="form-select" name="activity_level" required>
              <option value="" disabled>Activity Level</option>
              <option value="Sedentary" {% if userinfo.activity_level == 'Sedentary' %}selected{% endif %}>Sedentary</option>
              <option value="Lightly Active" {% if userinfo.activity_level == 'Lightly Active' %}selected{% endif %}>Lightly Active</option>
              <option value="Moderately Active" {% if userinfo.activity_level == 'Moderately Active' %}selected{% endif %}>Moderately Active</option>
              <option value="Very Active" {% if userinfo.activity_level == 'Very Active' %}selected{% endif %}>Very Active</option>
              <option value="Super Active" {% if userinfo.activity_level == 'Super Active' %}selected{% endif %}>Super Active</option>
            </select>
            <label>Activity</label>
          </div>
        </div>
        <div class="col-md-4">
          <div class="form-floating">
            <select class="form-select" name="goal" required>
              <option value="" disabled selected>Goal</option>
              <option value="Lose Weight" {% if userinfo.goal == 'Lose Weight' %}selected{% endif %}>Lose Weight</option>
              <option value="Maintain" {% if userinfo.goal == 'Maintain' %}selected{% endif %}>Maintain</option>
              <option value="Gain Weight" {% if userinfo.goal == 'Gain Weight' %}selected{% endif %}>Gain Weight</option>
            </select>
            <label>Goal</label>
          </div>
        </div>
      </div>
    </div>

    <div class="mt-3 d-flex justify-content-center gap-3">
      <button type="submit" class="btn btn-success px-5 shadow-sm" style="border-radius: 10px; padding: 10px 0;">Update</button>
      <button type="button" class="btn btn-dark px-5 shadow-sm" style="border-radius: 10px; padding: 10px 0;" onclick="window.history.back()">Exit</button>
    </div>
  </form>
</div>
{% endblock %}
